# =============================================================================
# Tecno Táctil — Nginx: n8n
# Dominio: bak.tecnotactil.com
# =============================================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name bak.tecnotactil.com;

    # Ruta para verificación de Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — n8n
server {
    listen 443 ssl;
    http2 on;
    server_name bak.tecnotactil.com;

    # --- Certificados SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/bak.tecnotactil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bak.tecnotactil.com/privkey.pem;

    # --- Parámetros SSL seguros ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # --- Headers de seguridad ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # --- Tamaño máximo de cuerpo (para archivos en n8n) ---
    client_max_body_size 50M;

    # --- Timeouts para workflows largos ---
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    # --- Proxy hacia n8n ---
    location / {
        proxy_pass http://tt_n8n:5678;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
